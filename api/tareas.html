<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Task-AJAX Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }

        .task-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #eee; transition: 0.3s;
        }
        .task-item:hover { background: #f8f9fa; }
        .delete-btn { background: #ea4335; font-size: 12px; padding: 5px 10px; }
        .status { font-size: 11px; color: #34a853; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mis Tareas AJAX</h2>
    <span id="serverStatus" class="status">Listo para conectar...</span>
    
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Nueva tarea...">
        <button id="addBtn">Añadir</button>
    </div>

    <div id="taskList">
        </div>
</div>

<script>
    const taskList = document.getElementById('taskList');
    const taskInput = document.getElementById('taskInput');
    const status = document.getElementById('serverStatus');

    // 1. CARGAR TAREAS (GET)
    async function loadTasks() {
        status.innerText = "Cargando desde servidor...";
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/todos?_limit=5');
            const data = await response.json();
            data.forEach(task => createTaskElement(task.title, task.id));
            status.innerText = "Conectado: Datos recuperados";
        } catch (e) { status.innerText = "Error de conexión"; }
    }

    // 2. CREAR TAREA (POST)
    async function addTask() {
        const title = taskInput.value;
        if (!title) return;

        status.innerText = "Enviando al servidor...";
        
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                body: JSON.stringify({ title: title, userId: 1 }),
                headers: { 'Content-type': 'application/json; charset=UTF-8' }
            });
            const newTask = await response.json();
            
            // Si el servidor responde 201 (Creado), lo añadimos a la lista
            createTaskElement(newTask.title, newTask.id);
            taskInput.value = '';
            status.innerText = "Tarea guardada (Simulado)";
        } catch (e) { status.innerText = "Error al guardar"; }
    }

    // 3. BORRAR TAREA (DELETE)
    async function deleteTask(id, element) {
        status.innerText = "Eliminando...";
        try {
            await fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, { method: 'DELETE' });
            element.remove();
            status.innerText = "Tarea eliminada del servidor";
        } catch (e) { status.innerText = "Error al borrar"; }
    }

    // Función auxiliar para pintar en el HTML
    function createTaskElement(title, id) {
        const div = document.createElement('div');
        div.className = 'task-item';
        div.innerHTML = `
            <span>${title}</span>
            <button class="delete-btn" onclick="deleteTask(${id}, this.parentElement)">Borrar</button>
        `;
        taskList.prepend(div);
    }

    document.getElementById('addBtn').addEventListener('click', addTask);
    window.onload = loadTasks;
</script>

</body>
</html>
